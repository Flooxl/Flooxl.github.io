<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Office Security Pro - Final Logic Fix</title>
    <style>
        :root {
            --bg-glass: rgba(43, 79, 92, 0.9);
            --border-desk: #ff4d4d;
            --border-pc: #4dff4d;
            --border-safe: #ffff4d;
            --border-inv: #4d94ff;
            --border-end: #ffffff;
        }

        body {
            background: linear-gradient(145deg, #1e3c4f 0%, #0f2837 100%);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .game-container {
            width: 95vw;
            height: 90vh;
            max-width: 1400px;
            background: var(--bg-glass);
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            padding: 20px;
            display: grid;
            grid-template-columns: 320px 1fr;
            grid-template-rows: 250px 1fr 80px;
            gap: 20px;
            box-sizing: border-box;
        }

        .section {
            border: 2px solid;
            border-radius: 15px;
            padding: 15px;
            background: rgba(0,0,0,0.2);
            position: relative;
            box-sizing: border-box;
        }

        .section-title {
            position: absolute;
            top: -12px;
            left: 20px;
            padding: 2px 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: bold;
            z-index: 10;
            border-radius: 5px;
            color: #fefefe;
        }

        #desk-section { grid-column: 1; grid-row: 1; border-color: var(--border-desk); }
        #desk-section .section-title { background: var(--border-desk); }

        #safe-section { grid-column: 1; grid-row: 2; border-color: var(--border-safe); }
        #safe-section .section-title { background: #b8b800; }

        #pc-section { 
            grid-column: 2; grid-row: 1 / span 2; 
            border-color: var(--border-pc); 
            background: #000; padding: 0;
            display: flex; flex-direction: column;
            overflow: hidden;
        }
        #pc-section .section-title { background: #2d8a2d; }

        #inv-section { grid-column: 2; grid-row: 3; border-color: var(--border-inv); display: flex; align-items: center; gap: 15px; }
        #inv-section .section-title { background: var(--border-inv); }

        #end-section { 
            grid-column: 1; grid-row: 3; border-color: var(--border-end); 
            display: flex; justify-content: center; align-items: center; cursor: pointer;
            font-weight: bold; font-size: 1.2rem; transition: 0.3s;
        }
        #end-section:hover { background: white; color: black; }

        .monitor {
            flex: 1;
            background: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1200&q=80') center/cover;
            position: relative;
            overflow: hidden;
        }

        .desktop-icons { padding: 30px; display: flex; flex-direction: column; gap: 25px; }
        .icon { width: 80px; text-align: center; cursor: pointer; font-size: 0.8rem; text-shadow: 1px 1px 3px black; transition: 0.1s; }
        .icon:hover { transform: scale(1.05); }
        .icon img { width: 48px; height: 48px; margin-bottom: 5px; }

        .taskbar {
            height: 42px;
            background: rgba(0,0,0,0.92);
            display: flex;
            align-items: center;
            padding: 0 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
            z-index: 1100;
        }

        .usb-tray { margin-left: auto; display: flex; align-items: center; gap: 10px; font-size: 0.8rem; }
        .usb-eject { background: #333; border: 1px solid #555; color: white; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 0.75rem; }

        .window {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 85%; height: 80%; background: #fff; color: #333;
            border-radius: 8px; box-shadow: 0 15px 50px rgba(0,0,0,0.7);
            display: none; flex-direction: column; z-index: 100;
        }
        .window-header { background: #f3f3f3; padding: 10px 15px; display: flex; justify-content: space-between; border-bottom: 1px solid #ccc; font-weight: bold; }
        .close-btn { cursor: pointer; color: #888; font-size: 1.5rem; line-height: 1; }

        .mail-top-bar { padding: 10px 20px; border-bottom: 1px solid #eee; display: flex; justify-content: flex-end; }
        .user-profile { position: relative; cursor: pointer; padding: 5px 12px; border-radius: 4px; font-size: 0.9rem; }
        .profile-menu {
            position: absolute; top: 110%; right: 0; background: white;
            border: 1px solid #ccc; padding: 5px; z-index: 200; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            display: none; border-radius: 4px; min-width: 150px;
        }
        .profile-menu button { 
            white-space: nowrap; background: none; border: none; padding: 10px 15px; 
            cursor: pointer; color: #d93025; font-weight: bold; width: 100%; text-align: left;
        }

        .mail-sidebar { width: 180px; background: #f8f9fa; border-right: 1px solid #eee; }
        .mail-tab { padding: 12px 20px; cursor: pointer; font-size: 0.85rem; color: #666; }
        .mail-tab.active { background: #e8f0fe; color: #1a73e8; font-weight: bold; border-left: 4px solid #1a73e8; }

        .trash-list { padding: 10px; flex: 1; overflow-y: auto; }
        .trash-row { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #f0f0f0; font-size: 0.95rem; }
        .trash-row img { width: 32px; margin-right: 15px; }

        #lock-screen {
            position: absolute; inset: 0; background: rgba(0,0,0,0.3);
            backdrop-filter: blur(25px); display: none;
            justify-content: center; align-items: center; z-index: 1000;
        }
        .lock-box { background: rgba(255,255,255,0.95); padding: 45px; border-radius: 20px; text-align: center; color: #333; width: 320px; }
        .lock-box input { width: 100%; padding: 12px; margin: 20px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }

        .item-btn {
            background: #2b4f5c; color: white; border: 1px solid #4d94ff;
            padding: 12px; margin-bottom: 12px; border-radius: 8px; cursor: pointer; width: 100%;
            text-align: left;
        }

        /* ЭКРАН РЕЗУЛЬТАТОВ */
        #results-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.9); z-index: 9999;
            display: none; justify-content: center; align-items: center;
        }
        .results-box {
            background: #2b4f5c; padding: 40px; border-radius: 25px;
            width: 600px; border: 2px solid white; text-align: center;
        }
        .grade { font-size: 4rem; font-weight: bold; margin: 20px 0; color: #4dff4d; }
        .risk-item { text-align: left; background: rgba(255,255,255,0.1); padding: 10px; margin-bottom: 10px; border-radius: 8px; font-size: 0.9rem; }
        .risk-title { color: #ff4d4d; font-weight: bold; margin-bottom: 3px; }
    </style>
</head>
<body>

<div id="results-screen">
    <div class="results-box">
        <h1>ОТЧЕТ ПО БЕЗОПАСНОСТИ</h1>
        <div id="final-grade" class="grade">S</div>
        <div id="risks-container"></div>
        <button class="item-btn" style="text-align: center; margin-top: 20px; font-weight: bold;" onclick="location.reload()">НАЧАТЬ НОВУЮ СМЕНУ</button>
    </div>
</div>

<div class="game-container">
    <div class="section" id="desk-section">
        <span class="section-title">Рабочий стол</span>
        <div id="desk-items" style="margin-top:15px;"></div>
    </div>

    <div class="section" id="safe-section">
        <span class="section-title">Сейф</span>
        <div id="safe-controls" style="margin-top:15px;"></div>
    </div>

    <div class="section" id="pc-section">
        <span class="section-title">Персональный компьютер</span>
        
        <div class="monitor" id="monitor">
            <div id="pc-off-screen" style="position:absolute; inset:0; background:black; z-index:2000; display:none; justify-content:center; align-items:center;">NO SIGNAL</div>
            
            <div id="lock-screen">
                <div class="lock-box">
                    <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" width="70">
                    <h2 id="lock-user-name">Сотрудник</h2>
                    <input type="password" id="pass-input" placeholder="Пароль...">
                    <button class="item-btn" style="text-align:center" onclick="unlockPC()">Войти</button>
                </div>
            </div>

            <div class="desktop-icons">
                <div class="icon" onclick="openWindow('mail-window')">
                    <img src="https://cdn-icons-png.flaticon.com/512/561/561127.png"> Почта
                </div>
                <div class="icon" onclick="openWindow('trash-window')">
                    <img src="https://cdn-icons-png.flaticon.com/512/3221/3221803.png"> Корзина
                </div>
            </div>

            <div class="window" id="mail-window">
                <div class="window-header"><span>Outlook Web App</span><span class="close-btn" onclick="closeWindow('mail-window')">×</span></div>
                <div class="mail-top-bar">
                    <div class="user-profile" id="user-btn" onclick="toggleProfileMenu(event)">
                        <span id="mail-header-name">Сотрудник (it_dep@corp.com)</span> ▼
                        <div class="profile-menu" id="p-menu">
                            <button id="logout-btn" onclick="logoutEmail()">Выйти из аккаунта</button>
                        </div>
                    </div>
                </div>
                <div style="display:flex; flex:1; overflow:hidden;">
                    <div class="mail-sidebar">
                        <div class="mail-tab active" id="tab-inbox" onclick="switchTab(this, 'inbox')">Входящие</div>
                        <div class="mail-tab" onclick="switchTab(this, 'sent')">Отправленные</div>
                        <div class="mail-tab" onclick="switchTab(this, 'drafts')">Черновики</div>
                        <div class="mail-tab" onclick="switchTab(this, 'deleted')">Удаленные</div>
                    </div>
                    <div id="mail-list-div" style="flex:1; padding:15px; background:white; overflow-y:auto;"></div>
                </div>
            </div>

            <div class="window" id="trash-window">
                <div class="window-header"><span>Корзина</span><span class="close-btn" onclick="closeWindow('trash-window')">×</span></div>
                <div style="padding: 12px 20px; background: #f8f8f8; border-bottom: 1px solid #ddd;">
                    <button onclick="emptyTrash()">Очистить корзину</button>
                </div>
                <div class="trash-list" id="trash-items-div"></div>
            </div>
        </div>

        <div class="taskbar">
            <button onclick="togglePC()" style="background:none; border:none; cursor:pointer; font-size:1.3rem;">🔘</button>
            <button onclick="lockPC()" style="margin-left:15px; background:#444; color:white; border:none; border-radius:4px; padding:5px 12px; cursor:pointer; font-size:0.75rem;">LOCK</button>
            <div class="usb-tray" id="usb-tray">
                <span style="color:#4dff4d">[USB-DISK-E:]</span>
                <button class="usb-eject" onclick="ejectUSB()">Извлечь USB устройство</button>
            </div>
            <span id="clock" style="margin-left:25px; font-size:0.85rem;">20:00</span>
        </div>
    </div>

    <div class="section" id="inv-section">
        <span class="section-title">Инвентарь</span>
        <div id="inv-list" style="display:flex; gap:15px;"></div>
    </div>

    <div class="section" id="end-section" onclick="finishDay()">ЗАВЕРШИТЬ ДЕНЬ</div>
</div>

<script>
    let state = {
        pcStatus: 'on', 
        emailLoggedIn: true,
        trashEmpty: false,
        usbPlugged: true,
        safeOpen: false,
        inventory: [],
        itemsOnDesk: ['keys', 'docs', 'sticker'],
        password: Math.random().toString(36).substring(7).toUpperCase(),
        currentMailTab: 'inbox'
    };

    const mailContent = {
        inbox: `<div style="padding:10px; border-bottom:1px solid #eee;"><b>IT-Dept:</b> Срочно проверьте настройки...</div>
                <div style="padding:10px; border-bottom:1px solid #eee;"><b>Security:</b> Отчет по уязвимостям...</div>`,
        sent: `<div style="padding:10px; border-bottom:1px solid #eee;"><b>Вы:</b> Файлы отправил в сейф.</div>`,
        drafts: `<div style="padding:10px; border-bottom:1px solid #eee;"><i>(Без темы)</i> - Нужно не забыть извлечь...</div>`,
        deleted: `<div style="padding:10px; border-bottom:1px solid #eee; color:#999;">Рассылка: Скидки на кофе...</div>`
    };

    function updateUI() {
        const desk = document.getElementById('desk-items');
        desk.innerHTML = '';
        state.itemsOnDesk.forEach(item => {
            let label = item === 'keys' ? '🔑 Ключи от сейфа' : item === 'docs' ? '📄 Документы' : '📝 Стикер с паролем';
            desk.innerHTML += `<button class="item-btn" onclick="takeItem('${item}')">${label}</button>`;
        });

        const inv = document.getElementById('inv-list');
        inv.innerHTML = state.inventory.length ? '' : '<i>Пусто</i>';
        state.inventory.forEach(item => {
            let icon = item === 'keys' ? '🔑' : item === 'docs' ? '📄' : item === 'sticker' ? '📝' : '💽';
            inv.innerHTML += `<div style="background:#4d94ff; padding:12px; border-radius:10px; cursor:pointer;" onclick="useItem('${item}')">${icon}</div>`;
        });

        const safe = document.getElementById('safe-controls');
        safe.innerHTML = `<div style="font-size:3.5rem; text-align:center; margin-bottom:10px;">${state.safeOpen ? '🔓' : '🔐'}</div>`;
        if (state.safeOpen) {
            if (state.inventory.includes('docs')) safe.innerHTML += `<button class="item-btn" onclick="putDocs()">Положить документы</button>`;
            safe.innerHTML += `<button class="item-btn" onclick="state.safeOpen=false; updateUI()">Закрыть сейф</button>`;
        } else {
            safe.innerHTML += `<button class="item-btn" onclick="openSafe()">Открыть ключами</button>`;
        }

        document.getElementById('pc-off-screen').style.display = state.pcStatus === 'off' ? 'flex' : 'none';
        document.getElementById('lock-screen').style.display = state.pcStatus === 'locked' ? 'flex' : 'none';
        document.getElementById('usb-tray').style.display = state.usbPlugged ? 'flex' : 'none';

        const nameHeader = document.getElementById('mail-header-name');
        const mailList = document.getElementById('mail-list-div');
        const logoutBtn = document.getElementById('logout-btn');

        if (state.emailLoggedIn) {
            nameHeader.innerText = "Сотрудник (it_dep@corp.com)";
            mailList.innerHTML = mailContent[state.currentMailTab];
            logoutBtn.innerHTML = "Выйти из аккаунта";
            logoutBtn.disabled = false;
        } else {
            nameHeader.innerText = "Гость (не авторизован)";
            mailList.innerHTML = `<div style="text-align:center; margin-top:50px; color:#999;">Вы не авторизованы.</div>`;
            logoutBtn.innerHTML = "Вход не выполнен";
            logoutBtn.disabled = true;
        }

        const trashDiv = document.getElementById('trash-items-div');
        trashDiv.innerHTML = state.trashEmpty ? '<div style="color:#999; text-align:center; padding:30px;">Корзина пуста</div>' : `
            <div class="trash-row"><img src="https://cdn-icons-png.flaticon.com/512/337/337946.png"> confidential_info.pdf</div>
            <div class="trash-row"><img src="https://cdn-icons-png.flaticon.com/512/337/337946.png"> passwords_list.txt</div>`;
    }

    function switchTab(el, tabName) {
        if (!state.emailLoggedIn) return;
        state.currentMailTab = tabName;
        document.querySelectorAll('.mail-tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        updateUI();
    }

    function toggleProfileMenu(e) {
        e.stopPropagation();
        const menu = document.getElementById('p-menu');
        menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
    }

    window.onclick = () => document.getElementById('p-menu').style.display = 'none';

    function takeItem(item) {
        state.itemsOnDesk = state.itemsOnDesk.filter(i => i !== item);
        state.inventory.push(item);
        updateUI();
    }

    function useItem(item) { if (item === 'sticker') alert(`Пароль системы: ${state.password}`); }
    function openSafe() { if (state.inventory.includes('keys')) { state.safeOpen = true; updateUI(); } else alert("Нужны ключи!"); }
    function putDocs() { state.inventory = state.inventory.filter(i => i !== 'docs'); updateUI(); }
    function openWindow(id) { document.getElementById(id).style.display = 'flex'; }
    function closeWindow(id) { document.getElementById(id).style.display = 'none'; }
    function togglePC() { state.pcStatus = state.pcStatus === 'off' ? 'locked' : 'off'; updateUI(); }
    function lockPC() { state.pcStatus = 'locked'; updateUI(); }
    function unlockPC() { if (document.getElementById('pass-input').value.toUpperCase() === state.password) { state.pcStatus = 'on'; updateUI(); } else alert("Неверно!"); }
    function ejectUSB() { state.usbPlugged = false; state.inventory.push('usb'); updateUI(); }
    function logoutEmail() { state.emailLoggedIn = false; updateUI(); }
    function emptyTrash() { state.trashEmpty = true; updateUI(); }

    function finishDay() {
        let penalty = 0;
        let risks = [];

        if (state.usbPlugged) {
            penalty += 30;
            risks.push({title: "Оставлена флешка", desc: "Риск кражи физического носителя и утечки корпоративных данных сторонним лицам."});
        }
        if (state.inventory.includes('docs') || state.itemsOnDesk.includes('docs')) {
            penalty += 30;
            risks.push({title: "Документы не в сейфе", desc: "Конфиденциальная информация доступна клинингу или охране. Риск промышленного шпионажа."});
        }
        if (state.pcStatus !== 'off') {
            penalty += 15;
            risks.push({title: "ПК не выключен", desc: "Риск несанкционированного доступа к рабочему месту и сетевым ресурсам компании."});
        }
        if (state.emailLoggedIn) {
            penalty += 15;
            risks.push({title: "Сессия почты активна", desc: "Злоумышленник может отправить письмо от вашего имени или похитить переписку."});
        }
        if (state.safeOpen) {
            penalty += 10;
            risks.push({title: "Сейф открыт", desc: "Прямой доступ к печатям, деньгам или секретным документам компании."});
        }
        if (!state.trashEmpty) {
            penalty += 5;
            risks.push({title: "Корзина не очищена", desc: "Удаленные документы все еще можно восстановить и прочитать."});
        }

        const screen = document.getElementById('results-screen');
        const gradeEl = document.getElementById('final-grade');
        const container = document.getElementById('risks-container');

        let grade = "S";
        let color = "#4dff4d";
        if (penalty > 0) { grade = "A"; color = "#ffff4d"; }
        if (penalty > 30) { grade = "B"; color = "#ffa500"; }
        if (penalty > 60) { grade = "C"; color = "#ff4d4d"; }

        gradeEl.innerText = grade;
        gradeEl.style.color = color;

        container.innerHTML = risks.length > 0 ? "" : "<p>Нарушений не выявлено. Отличная работа!</p>";
        risks.forEach(r => {
            container.innerHTML += `
                <div class="risk-item">
                    <div class="risk-title">⚠ ${r.title}</div>
                    <div>${r.desc}</div>
                </div>
            `;
        });

        screen.style.display = "flex";
    }

    setInterval(() => {
        const d = new Date();
        document.getElementById('clock').innerText = d.getHours() + ":" + d.getMinutes().toString().padStart(2,'0');
    }, 1000);

    updateUI();
</script>
</body>
</html>
